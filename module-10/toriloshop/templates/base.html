{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ToriloShop{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<style>
  * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
.body {
      font-family: Arial, sans-serif;
      line-height: 1.6;
      background: #f4f4f4;
    }
    
.nav {
      background: #1a1a2e;
      padding: 1rem 2rem;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}
    
.nav a {
    color: white;
    text-decoration: none;
    margin-right: 20px;
    padding: 8px 16px;
    border-radius: 4px;
    transition: background 0.3s;
}
    
.nav a:hover {
    background: #16213e;
}
    
.main {
    max-width: 1200px;
    margin: 2rem auto;
    padding: 0 2rem;
    min-height: 70vh;
}
    
.footer {
    background: #1a1a2e;
    color: white;
    text-align: center;
    padding: 1rem;
    margin-top: 2rem;
}

.link{
    width: 50%;height: auto;
    margin-top: 200px;
    display: flex;
    justify-content: center;align-items: center;gap: 50px;
}
input{
    width: 70%;height: 50px;border: 3px solid black;border-radius: 10px;padding: 10px;
}input::placeholder{color: black;}
p{
    width: 90%;height: auto;
}

</style>
<body class="body">
  <nav class="nav">
    <a class="nav a" href="/">Home</a>
    <a href="/products/">Products</a>
    <a href="/about/">About</a>
    <a href="/categories/">Categories</a>
  </nav>

  <main class="main">
    {% if messages %}
        <div style="width: 50%;height: 40px;background-color: black;color: white;border-radius: 10px;padding: 10px;">
            {% for message in messages %}
                <div class="info">
                    {{message}}
                </div>
            {% endfor %}
        </div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <p>ToriloShop &copy; 2026</p>
  </footer>
</body>
</html>
